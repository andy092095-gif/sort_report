<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序演算法教學面板</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --success-color: #2ecc71;
            --highlight-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--secondary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }

        .menu-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        .menu-card h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 24px;
        }

        .menu-card p {
            color: #7f8c8d;
            font-size: 14px;
            margin: 15px 0;
        }

        .menu-link {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .menu-link:hover {
            background-color: #2980b9;
        }

        .panel {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 25px;
        }

        .panel h2 {
            margin-top: 0;
            color: var(--primary-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        /* 模擬區塊樣式 */
        #visualization {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 300px;
            margin: 20px 0;
            padding: 20px 0;
            border: 1px dashed #bdc3c7;
            border-radius: 8px;
            background-color: #fafafa;
            gap: 4px;
        }

        .bar {
            width: 30px;
            background-color: var(--primary-color);
            border-radius: 4px 4px 0 0;
            transition: height 0.2s ease, background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            color: white;
            font-size: 12px;
            padding-bottom: 5px;
            box-sizing: border-box;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            background-color: var(--primary-color);
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        #reset-btn {
            background-color: #7f8c8d;
        }

        #reset-btn:hover {
            background-color: #636e72;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎓 排序演算法教學面板</h1>

        <div class="menu-grid">
            <div class="menu-card">
                <h2>氣泡排序法</h2>
                <p>📝 Bubble Sort</p>
                <p>通過重複比較相鄰元素進行排序</p>
                <a href="bubble_sort.html" class="menu-link">進入教學 →</a>
            </div>

            <div class="menu-card">
                <h2>選擇排序法</h2>
                <p>📝 Selection Sort</p>
                <p>每次尋找最小元素進行排序</p>
                <a href="selection_sort.html" class="menu-link">進入教學 →</a>
            </div>

            <div class="menu-card">
                <h2>插入排序法</h2>
                <p>📝 Insertion Sort</p>
                <p>逐次將元素插入已排序的部分</p>
                <a href="insertion_sort.html" class="menu-link">進入教學 →</a>
            </div>

            <div class="menu-card">
                <h2>合併排序法</h2>
                <p>📝 Merge Sort</p>
                <p>分治法將陣列分割後進行排序</p>
                <a href="merge_sort.html" class="menu-link">進入教學 →</a>
            </div>
        </div>
    </div>
</body>
</html>
